<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
  
  <title>Frontend Mentor | Order summary card</title>

  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="card">
    <div class="card__image"></div>
    <div class="card__text">
      <h1 class="title">Order Summary</h1>
      <p class="text">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
      <div class="plan">
        <div class="box">
          <div class="plan__icon">
            <img src="images/icon-music.svg" alt="" />
          </div>
          <div class="plan__price">
            <strong>Annual Plan</strong>
            <span>$59.99/year</span>
          </div>
        </div>  
        <button type="button" class="plan__btn">Change</button>
      </div>
      <button type="button" class="btn-payment">Proceed to Payment</button>
      <button type="button" class="btn-cancel">Cancel Order</button>
    </div>
  </div>

</body>
</html>
